<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store — MedPlus</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav>
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
      <div class="logo-icon"><i class="fas fa-plus"></i></div>
      Med<span>Plus</span>
    </div>
    <div class="nav-actions">
      <button class="btn-cart" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i> Cart
        <div class="cart-count" id="cartCount">0</div>
      </button>
      <button class="btn-outline-sm" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-left"></i> All Stores
      </button>
    </div>
  </nav>

  <!-- Store Header -->
  <div class="store-header" id="storeHeader">
    <div class="loading-msg"><i class="fas fa-spinner fa-spin"></i><p>Loading store...</p></div>
  </div>

  <!-- Products Section -->
  <section class="products" style="padding-top:32px" id="products">
    <div class="products-header">
      <div>
        <p class="section-label">Products</p>
        <h2 class="section-title">Browse Medicines</h2>
      </div>
      <div class="filter-tabs" id="filterTabs">
        <button class="tab active" onclick="filterProducts('all', this)">All</button>
        <button class="tab" onclick="filterProducts('medicine', this)">Medicines</button>
        <button class="tab" onclick="filterProducts('vitamin', this)">Vitamins</button>
        <button class="tab" onclick="filterProducts('device', this)">Devices</button>
        <button class="tab" onclick="filterProducts('first_aid', this)">First Aid</button>
      </div>
    </div>

    <!-- Search bar -->
    <div class="search-strip" style="margin-bottom:24px;padding:16px 0;background:none">
      <div class="search-wrap" style="max-width:460px;margin:0;border-radius:10px;overflow:hidden;box-shadow:var(--shadow)">
        <input type="text" id="productSearch" placeholder="Search products in this store..." style="flex:1;border:none;padding:12px 16px;font-family:DM Sans,sans-serif;outline:none"/>
        <button onclick="doSearch()" style="background:var(--green);color:white;border:none;padding:12px 20px;cursor:pointer;font-family:DM Sans,sans-serif;font-weight:600">
          <i class="fas fa-search"></i>
        </button>
      </div>
    </div>

    <div class="prod-grid" id="prodGrid">
      <div class="loading-msg"><i class="fas fa-spinner fa-spin"></i><p>Loading products...</p></div>
    </div>
  </section>

  <!-- CART SIDEBAR -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>🛒 Your Cart</h3>
      <button class="cart-close" onclick="toggleCart()"><i class="fas fa-times"></i></button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="empty-cart"><i class="fas fa-shopping-basket"></i><p>Cart is empty</p></div>
    </div>
    <div class="cart-footer">
      <div class="cart-total"><span>Subtotal</span><span id="cartSubtotal">₹0</span></div>
      <div class="cart-total" style="font-size:.85rem;opacity:.7"><span>Delivery</span><span id="cartDelivery">₹40</span></div>
      <div class="cart-total" style="font-size:1.1rem"><span>Total</span><span id="cartTotal">₹40</span></div>
      <button class="btn-primary" style="width:100%;justify-content:center;margin-top:8px" onclick="placeOrder()">
        <i class="fas fa-lock"></i> Place Order
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="config.js"></script>
  <script>
    let storeId = null;
    let allProducts = [];
    let cart = [];

    window.addEventListener('DOMContentLoaded', () => {
      // Get storeId from URL: store.html?id=xxx
      const params = new URLSearchParams(window.location.search);
      storeId = params.get('id');

      if (!storeId) { window.location.href = 'index.html'; return; }

      loadStore();
      loadProducts();
    });

    async function loadStore() {
      try {
        const data = await apiCall(`/stores/${storeId}`);
        const s = data.store;
        document.title = `${s.name} — MedPlus`;
        document.getElementById('storeHeader').innerHTML = `
          <div class="store-banner">
            <div class="store-banner-content">
              <div style="font-size:3rem;margin-bottom:12px">🏥</div>
              <h1>${s.name}</h1>
              <p>${s.description || 'Your trusted local pharmacy'}</p>
              <div class="store-banner-meta">
                <span><i class="fas fa-map-marker-alt"></i> ${s.address.street}, ${s.address.city} – ${s.address.pincode}</span>
                <span><i class="fas fa-phone"></i> ${s.phone}</span>
                <span><i class="fas fa-clock"></i> ${s.hours?.weekdays || 'Mon–Sat: 9AM–9PM'}</span>
                ${s.isVerified ? '<span class="verified-badge"><i class="fas fa-check-circle"></i> Verified Store</span>' : ''}
              </div>
            </div>
          </div>
        `;
      } catch (e) {
        document.getElementById('storeHeader').innerHTML = '<p style="padding:20px 5%">Failed to load store info.</p>';
      }
    }

    async function loadProducts(category = 'all', search = '') {
      const grid = document.getElementById('prodGrid');
      grid.innerHTML = '<div class="loading-msg"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>';
      try {
        let endpoint = `/products?storeId=${storeId}`;
        if (category !== 'all') endpoint += `&category=${category}`;
        if (search) endpoint += `&search=${search}`;

        const data = await apiCall(endpoint);
        allProducts = data.products;

        if (allProducts.length === 0) {
          grid.innerHTML = '<p class="empty-msg">No products found.</p>';
          return;
        }

        renderProducts(allProducts);
      } catch (e) {
        grid.innerHTML = '<p class="empty-msg">Failed to load products.</p>';
      }
    }

    function renderProducts(products) {
      const grid = document.getElementById('prodGrid');
      grid.innerHTML = products.map(p => `
        <div class="prod-card">
          <div class="prod-img">
            ${p.requiresPrescription ? '<span class="badge-rx">Rx</span>' : ''}
            ${p.oldPrice ? `<span class="badge-discount">${Math.round((1-p.price/p.oldPrice)*100)}% OFF</span>` : ''}
            <span style="font-size:3rem">${p.emoji || '💊'}</span>
          </div>
          <div class="prod-info">
            <div class="prod-cat">${p.category}</div>
            <div class="prod-name">${p.name}</div>
            <div class="prod-desc">${p.description || ''}</div>
            <div class="prod-footer">
              <div class="prod-price">
                ₹${p.price}
                ${p.oldPrice ? `<s>₹${p.oldPrice}</s>` : ''}
              </div>
              ${p.inStock
                ? `<button class="btn-add" onclick="addToCart('${p._id}','${p.name}',${p.price},'${p.emoji||'💊'}')"><i class="fas fa-plus"></i> Add</button>`
                : `<span style="color:#e74c3c;font-size:.8rem;font-weight:600">Out of Stock</span>`
              }
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterProducts(cat, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      loadProducts(cat);
    }

    function doSearch() {
      const q = document.getElementById('productSearch').value.trim();
      loadProducts('all', q);
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.activeElement.id === 'productSearch') doSearch(); });

    // ── CART ──
    function addToCart(id, name, price, emoji) {
      const existing = cart.find(c => c.id === id);
      if (existing) existing.qty++;
      else cart.push({ id, name, price, emoji, qty: 1 });
      updateCartUI();
      showToast(`✅ ${name} added!`);
    }

    function removeFromCart(id) { cart = cart.filter(c => c.id !== id); updateCartUI(); }
    function changeQty(id, d) {
      const item = cart.find(c => c.id === id);
      if (!item) return;
      item.qty += d;
      if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
      updateCartUI();
    }

    function updateCartUI() {
      const count = cart.reduce((a, c) => a + c.qty, 0);
      document.getElementById('cartCount').textContent = count;

      const subtotal = cart.reduce((a, c) => a + c.price * c.qty, 0);
      const delivery = subtotal > 500 ? 0 : (subtotal > 0 ? 40 : 0);
      document.getElementById('cartSubtotal').textContent = `₹${subtotal}`;
      document.getElementById('cartDelivery').textContent = delivery === 0 ? 'FREE' : `₹${delivery}`;
      document.getElementById('cartTotal').textContent = `₹${subtotal + delivery}`;

      const el = document.getElementById('cartItems');
      if (cart.length === 0) {
        el.innerHTML = '<div class="empty-cart"><i class="fas fa-shopping-basket"></i><p>Cart is empty</p></div>';
      } else {
        el.innerHTML = cart.map(c => `
          <div class="cart-item">
            <div class="cart-item-img">${c.emoji}</div>
            <div class="cart-item-info">
              <strong>${c.name}</strong>
              <div class="item-price">₹${c.price}</div>
              <div class="item-qty">
                <button onclick="changeQty('${c.id}',-1)">−</button>
                <span>${c.qty}</span>
                <button onclick="changeQty('${c.id}',+1)">+</button>
              </div>
            </div>
            <button class="cart-item-remove" onclick="removeFromCart('${c.id}')"><i class="fas fa-trash"></i></button>
          </div>
        `).join('');
      }
    }

    function toggleCart() {
      document.getElementById('cartSidebar').classList.toggle('open');
      document.getElementById('cartOverlay').classList.toggle('open');
    }

    async function placeOrder() {
      if (cart.length === 0) { showToast('⚠️ Cart is empty'); return; }
      if (!getToken()) {
        showToast('🔐 Please login to place an order');
        setTimeout(() => window.location.href = `login.html?redirect=store.html?id=${storeId}`, 1500);
        return;
      }

      const address = prompt('Enter delivery address (Street, City, Pincode):');
      if (!address) return;
      const parts = address.split(',').map(s => s.trim());

      try {
        const data = await apiCall('/orders', 'POST', {
          storeId,
          items: cart.map(c => ({
            productId: c.id, productName: c.name, price: c.price, quantity: c.qty, emoji: c.emoji
          })),
          deliveryAddress: {
            street: parts[0] || address,
            city: parts[1] || '',
            pincode: parts[2] || ''
          }
        });
        showToast(`🎉 Order placed! Total: ${data.summary.total}`);
        cart = [];
        updateCartUI();
        toggleCart();
      } catch (e) {
        showToast(`❌ ${e.message}`);
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
