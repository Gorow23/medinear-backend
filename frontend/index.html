<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Med Plus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->

<header style="padding:20px; display:flex; justify-content:space-between;">
  <h2>Med Plus</h2>
</header>

<!-- HERO -->

<section style="padding:50px;">
  <h1>Find Medicines From Nearby Stores</h1>
  <p>Search medicines and order instantly</p>

  <!-- EXISTING PINCODE -->

  <input type="text" placeholder="Enter your pincode">
  <button>Find Stores</button>

  <!-- 🔥 NEW MEDICINE SEARCH -->

  <div style="margin-top:20px;">
    <input type="text" id="searchInput" placeholder="Search medicine (e.g. dolo)" style="padding:10px;width:60%;">
    <button onclick="searchMedicine()">Search Medicine</button>
  </div>

  <!-- RESULTS -->

  <div id="medicineResults" style="margin-top:20px;"></div>
</section>

<script>
const BASE_URL = "https://medinear-backend-w69d.onrender.com";

// 🔍 SEARCH MEDICINE
async function searchMedicine() {
  const input = document.getElementById("searchInput").value;

  if (!input) {
    alert("Please enter medicine name");
    return;
  }

  const res = await fetch(`${BASE_URL}/medicines/search?name=${input}`);
  const data = await res.json();

  const resultDiv = document.getElementById("medicineResults");
  resultDiv.innerHTML = "";

  if (data.length === 0) {
    resultDiv.innerHTML = "<p>No medicines found</p>";
    return;
  }

  data.forEach(item => {
    resultDiv.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h3>${item.name}</h3>
        <p>Price: ₹${item.price}</p>
        <button onclick="orderMedicine('${item.name}', '${item.store_id}')">
          Order Now
        </button>
      </div>
    `;
  });
}

// 🛒 PLACE ORDER
async function orderMedicine(name, store_id) {
  await fetch(`${BASE_URL}/orders/`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      customer_name: "Gaurav",
      medicine: name,
      store_id: store_id
    })
  });

  alert("Order placed successfully!");
}
</script>

</body>
</html>
