<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store Dashboard — MedPlus</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .dashboard { display:grid; grid-template-columns:220px 1fr; min-height:calc(100vh - 68px); }
    .sidebar { background:var(--dark); padding:24px 0; }
    .sidebar-item { display:flex; align-items:center; gap:12px; padding:12px 24px; color:#a8bfb0; font-size:.9rem; cursor:pointer; transition:all .2s; }
    .sidebar-item:hover, .sidebar-item.active { background:rgba(255,255,255,.08); color:white; }
    .sidebar-item i { width:18px; }
    .main-content { padding:32px; background:var(--light); }
    .stats-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
    .stat-card { background:white; border:1.5px solid var(--border); border-radius:16px; padding:20px; }
    .stat-card .stat-icon { width:44px;height:44px;background:var(--green-bg);border-radius:12px;display:grid;place-items:center;font-size:1.3rem;color:var(--green);margin-bottom:12px; }
    .stat-card .stat-val { font-family:'DM Serif Display',serif; font-size:1.8rem; color:var(--green); }
    .stat-card .stat-label { font-size:.8rem; color:var(--gray); }
    .section-card { background:white; border:1.5px solid var(--border); border-radius:18px; padding:24px; margin-bottom:24px; }
    .section-card h3 { margin-bottom:16px; }
    .order-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .order-row:last-child { border:none; }
    .status-badge { padding:4px 10px; border-radius:20px; font-size:.72rem; font-weight:700; }
    .status-pending { background:#fff3cd; color:#856404; }
    .status-confirmed { background:#cff4fc; color:#0c5460; }
    .status-preparing { background:#d1ecf1; color:#0c5460; }
    .status-out_for_delivery { background:#d4edda; color:#155724; }
    .status-delivered { background:#d4edda; color:#155724; }
    .status-cancelled { background:#f8d7da; color:#721c24; }
    .product-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .product-row:last-child { border:none; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    @media(max-width:768px) { .dashboard { grid-template-columns:1fr; } .sidebar { display:none; } }
  </style>
</head>
<body>
  <nav>
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
      <div class="logo-icon"><i class="fas fa-plus"></i></div>Med<span>Plus</span>
    </div>
    <div class="nav-actions">
      <span id="userGreeting" style="font-size:.88rem;color:var(--mid)"></span>
      <button class="btn-outline-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </nav>

  <div class="dashboard">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-item active" onclick="showTab('overview')"><i class="fas fa-chart-bar"></i> Overview</div>
      <div class="sidebar-item" onclick="showTab('orders')"><i class="fas fa-shopping-bag"></i> Orders</div>
      <div class="sidebar-item" onclick="showTab('products')"><i class="fas fa-pills"></i> Products</div>
      <div class="sidebar-item" onclick="showTab('store')"><i class="fas fa-store"></i> Store Settings</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">

      <!-- OVERVIEW TAB -->
      <div class="tab-content active" id="tab-overview">
        <h2 style="margin-bottom:20px">Dashboard</h2>
        <div class="stats-row" id="statsRow">
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-bag"></i></div><div class="stat-val" id="statOrders">—</div><div class="stat-label">Total Orders</div></div>
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-val" id="statPending">—</div><div class="stat-label">Pending Orders</div></div>
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-pills"></i></div><div class="stat-val" id="statProducts">—</div><div class="stat-label">Products Listed</div></div>
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-star"></i></div><div class="stat-val" id="statRating">—</div><div class="stat-label">Avg Rating</div></div>
        </div>

        <div class="section-card">
          <h3>Recent Orders</h3>
          <div id="recentOrders"><p style="color:var(--gray)">Loading...</p></div>
        </div>
      </div>

      <!-- ORDERS TAB -->
      <div class="tab-content" id="tab-orders">
        <h2 style="margin-bottom:20px">All Orders</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
          <button class="tab active" onclick="loadOrders('',this)">All</button>
          <button class="tab" onclick="loadOrders('pending',this)">Pending</button>
          <button class="tab" onclick="loadOrders('confirmed',this)">Confirmed</button>
          <button class="tab" onclick="loadOrders('preparing',this)">Preparing</button>
          <button class="tab" onclick="loadOrders('out_for_delivery',this)">Out for Delivery</button>
          <button class="tab" onclick="loadOrders('delivered',this)">Delivered</button>
        </div>
        <div class="section-card" id="ordersContainer"><p style="color:var(--gray)">Loading orders...</p></div>
      </div>

      <!-- PRODUCTS TAB -->
      <div class="tab-content" id="tab-products">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
          <h2>Products</h2>
          <button class="btn-primary" onclick="showAddProduct()"><i class="fas fa-plus"></i> Add Product</button>
        </div>

        <!-- Add Product Form (hidden by default) -->
        <div class="section-card" id="addProductForm" style="display:none;margin-bottom:20px">
          <h3>Add New Product</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px">
            <div class="form-group"><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">Product Name *</label><input type="text" id="pName" placeholder="Paracetamol 500mg" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none"/></div>
            <div class="form-group"><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">Category *</label>
              <select id="pCat" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none">
                <option value="medicine">Medicine</option><option value="vitamin">Vitamin</option><option value="device">Device</option><option value="first_aid">First Aid</option><option value="skincare">Skin Care</option><option value="baby">Baby Care</option><option value="dental">Dental</option><option value="other">Other</option>
              </select>
            </div>
            <div class="form-group"><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">Price (₹) *</label><input type="number" id="pPrice" placeholder="99" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none"/></div>
            <div class="form-group"><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">Old Price (₹)</label><input type="number" id="pOldPrice" placeholder="120" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none"/></div>
            <div class="form-group"><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">Stock Qty *</label><input type="number" id="pStock" placeholder="100" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none"/></div>
            <div class="form-group"><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">Emoji</label><input type="text" id="pEmoji" placeholder="💊" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none"/></div>
          </div>
          <div class="form-group" style="margin-top:4px"><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">Description</label><input type="text" id="pDesc" placeholder="Short description" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none"/></div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
            <input type="checkbox" id="pRx"/> <label style="font-size:.88rem">Requires Prescription (Rx)</label>
          </div>
          <div style="display:flex;gap:10px;margin-top:16px">
            <button class="btn-primary" onclick="addProduct()"><i class="fas fa-save"></i> Save Product</button>
            <button class="btn-outline" onclick="document.getElementById('addProductForm').style.display='none'">Cancel</button>
          </div>
        </div>

        <div class="section-card" id="productsContainer"><p style="color:var(--gray)">Loading products...</p></div>
      </div>

      <!-- STORE SETTINGS TAB -->
      <div class="tab-content" id="tab-store">
        <h2 style="margin-bottom:20px">Store Settings</h2>
        <div class="section-card" id="storeForm">
          <p style="color:var(--gray)">Loading store info...</p>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="config.js"></script>
  <script>
    let myStore = null;
    let myProducts = [];

    window.addEventListener('DOMContentLoaded', async () => {
      const user = getUser();
      if (!user) { window.location.href = 'login.html'; return; }
      document.getElementById('userGreeting').textContent = `Hi, ${user.name}`;
      await loadDashboard();
    });

    async function loadDashboard() {
      try {
        // Load store info
        const user = getUser();
        const storeData = await apiCall(`/stores?ownerId=${user.id}`);
        // Try to get store orders to find store
        const ordersData = await apiCall('/orders/store');
        // Load stats
        await loadStats();
        await loadRecentOrders();
        await loadProducts();
      } catch (e) {
        // User might not have a store yet
        showRegisterStorePrompt();
      }
    }

    async function loadStats() {
      try {
        const orders = await apiCall('/orders/store');
        const products = await apiCall('/products?storeId=__STORE__'); // placeholder
        const pending = orders.orders.filter(o => o.status === 'pending').length;
        document.getElementById('statOrders').textContent = orders.count;
        document.getElementById('statPending').textContent = pending;
      } catch(e) {}
    }

    async function loadRecentOrders() {
      try {
        const data = await apiCall('/orders/store');
        const recent = data.orders.slice(0, 5);
        const el = document.getElementById('recentOrders');
        if (recent.length === 0) { el.innerHTML = '<p style="color:var(--gray)">No orders yet.</p>'; return; }
        el.innerHTML = recent.map(o => `
          <div class="order-row">
            <div style="flex:1">
              <strong>#${o._id.slice(-6).toUpperCase()}</strong>
              <span style="font-size:.8rem;color:var(--gray);margin-left:8px">${o.items.length} item(s) • ₹${o.totalAmount}</span>
            </div>
            <div><strong>${o.customerId?.name || 'Customer'}</strong><br><span style="font-size:.78rem;color:var(--gray)">${o.customerId?.phone || ''}</span></div>
            <span class="status-badge status-${o.status}">${o.status.replace(/_/g,' ')}</span>
            <select onchange="updateStatus('${o._id}',this.value)" style="border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-family:DM Sans,sans-serif;font-size:.82rem;outline:none">
              <option>Update Status</option>
              <option value="confirmed">Confirmed</option>
              <option value="preparing">Preparing</option>
              <option value="out_for_delivery">Out for Delivery</option>
              <option value="delivered">Delivered</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        `).join('');
      } catch(e) {
        document.getElementById('recentOrders').innerHTML = '<p style="color:var(--gray)">No orders yet.</p>';
      }
    }

    async function loadOrders(status = '', btn) {
      if (btn) { document.querySelectorAll('#tab-orders .tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); }
      const el = document.getElementById('ordersContainer');
      el.innerHTML = '<p style="color:var(--gray)">Loading...</p>';
      try {
        const endpoint = status ? `/orders/store?status=${status}` : '/orders/store';
        const data = await apiCall(endpoint);
        if (data.orders.length === 0) { el.innerHTML = '<p style="color:var(--gray)">No orders found.</p>'; return; }
        el.innerHTML = data.orders.map(o => `
          <div class="order-row">
            <div style="flex:1">
              <strong>#${o._id.slice(-6).toUpperCase()}</strong>
              <div style="font-size:.8rem;color:var(--gray);margin-top:2px">${o.items.map(i=>i.productName).join(', ')}</div>
            </div>
            <div><strong>${o.customerId?.name || '—'}</strong><br><span style="font-size:.78rem;color:var(--gray)">${o.customerId?.phone || ''}</span></div>
            <strong style="color:var(--green)">₹${o.totalAmount}</strong>
            <span class="status-badge status-${o.status}">${o.status.replace(/_/g,' ')}</span>
            <select onchange="updateStatus('${o._id}',this.value)" style="border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-family:DM Sans,sans-serif;font-size:.82rem;outline:none">
              <option>Change Status</option>
              <option value="confirmed">Confirmed</option><option value="preparing">Preparing</option>
              <option value="out_for_delivery">Out for Delivery</option><option value="delivered">Delivered</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        `).join('');
      } catch(e) { el.innerHTML = '<p style="color:var(--gray)">Failed to load orders.</p>'; }
    }

    async function updateStatus(orderId, status) {
      if (!status || status === 'Change Status' || status === 'Update Status') return;
      try {
        await apiCall(`/orders/${orderId}/status`, 'PUT', { status });
        showToast(`✅ Order updated to: ${status}`);
        loadRecentOrders();
        loadOrders();
      } catch(e) { showToast(`❌ ${e.message}`); }
    }

    async function loadProducts() {
      const el = document.getElementById('productsContainer');
      try {
        // Get user's store first
        const meData = await apiCall('/auth/me');
        const storeId = meData.user.storeId;
        if (!storeId) { el.innerHTML = '<p style="color:var(--gray)">Register your store first.</p>'; document.getElementById('statProducts').textContent = '0'; return; }

        const data = await apiCall(`/products?storeId=${storeId}`);
        myProducts = data.products;
        document.getElementById('statProducts').textContent = data.count;

        if (data.products.length === 0) { el.innerHTML = '<p style="color:var(--gray)">No products yet. Add your first product!</p>'; return; }

        el.innerHTML = data.products.map(p => `
          <div class="product-row">
            <span style="font-size:1.6rem">${p.emoji || '💊'}</span>
            <div style="flex:1"><strong>${p.name}</strong><br><span style="font-size:.78rem;color:var(--gray)">${p.category} • Stock: ${p.stock}</span></div>
            <strong style="color:var(--green)">₹${p.price}</strong>
            <span class="${p.inStock ? 'pill' : ''}" style="${p.inStock ? '' : 'color:#e74c3c;font-size:.78rem;font-weight:700'}">${p.inStock ? 'In Stock' : 'Out of Stock'}</span>
            <button onclick="deleteProduct('${p._id}')" style="background:none;border:none;cursor:pointer;color:#e74c3c;font-size:.9rem"><i class="fas fa-trash"></i></button>
          </div>
        `).join('');
      } catch(e) { el.innerHTML = '<p style="color:var(--gray)">Failed to load products.</p>'; }
    }

    function showAddProduct() {
      const f = document.getElementById('addProductForm');
      f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }

    async function addProduct() {
      const name = document.getElementById('pName').value.trim();
      const category = document.getElementById('pCat').value;
      const price = parseFloat(document.getElementById('pPrice').value);
      const oldPrice = parseFloat(document.getElementById('pOldPrice').value) || null;
      const stock = parseInt(document.getElementById('pStock').value) || 0;
      const emoji = document.getElementById('pEmoji').value || '💊';
      const description = document.getElementById('pDesc').value.trim();
      const requiresPrescription = document.getElementById('pRx').checked;

      if (!name || !price) { showToast('⚠️ Name and price are required'); return; }

      try {
        await apiCall('/products', 'POST', { name, category, price, oldPrice, stock, emoji, description, requiresPrescription });
        showToast('✅ Product added!');
        document.getElementById('addProductForm').style.display = 'none';
        loadProducts();
      } catch(e) { showToast(`❌ ${e.message}`); }
    }

    async function deleteProduct(id) {
      if (!confirm('Remove this product?')) return;
      try {
        await apiCall(`/products/${id}`, 'DELETE');
        showToast('✅ Product removed');
        loadProducts();
      } catch(e) { showToast(`❌ ${e.message}`); }
    }

    function showRegisterStorePrompt() {
      document.getElementById('storeForm').innerHTML = `
        <h3>Register Your Pharmacy</h3>
        <p style="color:var(--gray);margin-bottom:20px">You haven't registered a store yet. Fill in details below to get started.</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">Store Name *</label><input type="text" id="sName" placeholder="MedPlus Pharmacy" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none"/></div>
          <div><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">Phone *</label><input type="tel" id="sPhone" placeholder="+91 98765 43210" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none"/></div>
          <div><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">Street *</label><input type="text" id="sStreet" placeholder="12 Linking Road" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none"/></div>
          <div><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">City *</label><input type="text" id="sCity" placeholder="Mumbai" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none"/></div>
          <div><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">State *</label><input type="text" id="sState" placeholder="Maharashtra" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none"/></div>
          <div><label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);margin-bottom:5px">Pincode *</label><input type="text" id="sPincode" placeholder="400050" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:DM Sans,sans-serif;outline:none"/></div>
        </div>
        <button class="btn-primary" style="margin-top:20px" onclick="registerStore()"><i class="fas fa-store"></i> Register Store</button>
      `;
    }

    async function registerStore() {
      const name = document.getElementById('sName')?.value.trim();
      const phone = document.getElementById('sPhone')?.value.trim();
      const street = document.getElementById('sStreet')?.value.trim();
      const city = document.getElementById('sCity')?.value.trim();
      const state = document.getElementById('sState')?.value.trim();
      const pincode = document.getElementById('sPincode')?.value.trim();
      if (!name || !phone || !street || !city || !pincode) { showToast('⚠️ All fields required'); return; }
      try {
        await apiCall('/stores', 'POST', { name, phone, address: { street, city, state, pincode } });
        showToast('🎉 Store registered!');
        setTimeout(() => window.location.reload(), 1000);
      } catch(e) { showToast(`❌ ${e.message}`); }
    }

    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.sidebar-item').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      event.currentTarget.classList.add('active');
      if (tab === 'orders') loadOrders();
      if (tab === 'products') loadProducts();
      if (tab === 'store') showRegisterStorePrompt();
    }

    function logout() { clearAuth(); window.location.href = 'index.html'; }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
